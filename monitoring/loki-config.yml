# Loki config for Aceso's CX23 monitoring stack.
#
# Single-binary, no auth, in-memory ring, filesystem object store, 30-day
# retention. NOT suitable for multi-host or HA deployments. Sized for a
# single Hetzner CX23 — bump retention and add object storage when you
# outgrow filesystem.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level:        info

common:
  instance_addr: 127.0.0.1
  path_prefix:   /loki
  ring:
    kvstore:
      store: inmemory
  replication_factor: 1
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules

schema_config:
  configs:
    - from:         2024-01-01
      store:        tsdb
      object_store: filesystem
      schema:       v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location:         /loki/tsdb-cache
    cache_ttl:              24h
  filesystem:
    directory: /loki/chunks

compactor:
  working_directory:    /loki/compactor
  delete_request_store: filesystem

limits_config:
  allow_structured_metadata: true
  retention_period:          720h   # 30 days

analytics:
  reporting_enabled: false
