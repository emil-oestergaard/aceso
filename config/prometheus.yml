# Prometheus config for Aceso's local dev stack.
#
# Tight cadence (5s scrape, 5s eval) so the test alert fires almost
# immediately after `up`. The rule file at /etc/prometheus/test_alert.yml
# defines an always-firing alert so Aceso has something to diagnose.

global:
  scrape_interval:     5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/test_alert.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
