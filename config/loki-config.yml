# Loki config for Aceso's local dev stack.
#
# Single-binary, no auth, in-memory ring, filesystem object store —
# the smallest viable Loki for a smoke test. NOT suitable for
# production: there is no replication, no shared storage, and no
# retention policy tuning beyond the one below.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level:        info

common:
  instance_addr: 127.0.0.1
  path_prefix:   /loki
  ring:
    kvstore:
      store: inmemory
  replication_factor: 1
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules

schema_config:
  configs:
    - from:         2024-01-01
      store:        tsdb
      object_store: filesystem
      schema:       v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location:         /loki/tsdb-cache
    cache_ttl:              24h
  filesystem:
    directory: /loki/chunks

compactor:
  working_directory:    /loki/compactor
  delete_request_store: filesystem

limits_config:
  allow_structured_metadata: true
  retention_period:          168h   # 7 days, plenty for dev

analytics:
  reporting_enabled: false
