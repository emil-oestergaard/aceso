# Promtail config for Aceso's local dev stack.
#
# Two scrape sources:
#   1) /var/log/*.log on the host (job=varlogs)
#   2) Docker service-discovery — every container's stdout/stderr,
#      relabeled so the `container` label is the human-readable name.
#
# The `container` label is one of Aceso's seven preferred LogQL
# selectors (agent/loki.go), so any container's logs become reachable
# via {container="<name>"} from a future alert that carries that label.
#
# Positions are written to /tmp so they reset on container restart —
# fine for dev; production would persist them on a volume.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level:        info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # 1) Host /var/log/*.log
  - job_name: varlogs
    static_configs:
      - targets:
          - localhost
        labels:
          job:      varlogs
          __path__: /var/log/*.log

  # 2) Docker container stdout/stderr via the host docker socket.
  - job_name: docker
    docker_sd_configs:
      - host:             unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Strip the leading "/" from "/aceso-dev-prometheus" → "aceso-dev-prometheus"
      - source_labels: ['__meta_docker_container_name']
        regex:         '/(.*)'
        target_label:  container
      # Surface the image so the LLM can reason about the runtime.
      - source_labels: ['__meta_docker_container_image']
        target_label:  image
      # stdout vs stderr.
      - source_labels: ['__meta_docker_container_log_stream']
        target_label:  stream
