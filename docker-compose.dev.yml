# Aceso V0 — local development stack.
#
# Brings up Prometheus + Loki + Promtail + Ollama + Aceso on a private
# bridge network so you can run the first real smoke test without
# touching production. The "monitoring" network is defined here, not
# external (unlike docker-compose.yml).
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build -d
#   docker compose -f docker-compose.dev.yml logs -f aceso
#   docker compose -f docker-compose.dev.yml exec aceso cat /data/incidents.json
#   docker compose -f docker-compose.dev.yml down              # keep volumes
#   docker compose -f docker-compose.dev.yml down -v           # nuke volumes
#
# Bootstrap note: Ollama starts empty. Pull the default model once:
#   docker compose -f docker-compose.dev.yml exec ollama ollama pull gemma2:2b

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: aceso-dev-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/test_alert.yml:/etc/prometheus/test_alert.yml:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:latest
    container_name: aceso-dev-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./config/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:latest
    container_name: aceso-dev-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    depends_on:
      - loki
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    image: ollama/ollama:latest
    container_name: aceso-dev-ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  aceso:
    build:
      context: ./agent
      dockerfile: Dockerfile
    image: aceso:dev
    container_name: aceso-dev
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - ollama
    environment:
      PROMETHEUS_URL:        http://prometheus:9090
      LOKI_URL:              http://loki:3100
      OLLAMA_URL:            http://ollama:11434
      OLLAMA_MODEL:          ${OLLAMA_MODEL:-gemma2:2b}
      POLL_INTERVAL_SECONDS: 15
      HTTP_TIMEOUT_SECONDS:  30
      INCIDENTS_PATH:        /data/incidents.json
      TZ:                    UTC

      # The dev stack runs Ollama-only by default (no API keys required).
      # Export DEEPSEEK_API_KEY / GEMINI_API_KEY in your shell or .env to
      # exercise the fallback path locally without touching production.
      BACKEND_ORDER:    ${BACKEND_ORDER:-ollama,deepseek,gemini}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GEMINI_API_KEY:   ${GEMINI_API_KEY:-}
    volumes:
      - aceso-data:/data
    networks:
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  prometheus-data:
    driver: local
  loki-data:
    driver: local
  ollama-data:
    driver: local
  aceso-data:
    driver: local

networks:
  # Private bridge for the dev stack. Explicit name prevents collision
  # with the production "monitoring" external network used by
  # docker-compose.yml.
  monitoring:
    name: aceso-dev-monitoring
    driver: bridge
